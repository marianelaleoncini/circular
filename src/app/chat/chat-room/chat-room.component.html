<div class="chat-room">
  
  <ng-container *ngIf="chatId; else emptyState">
    
    <mat-toolbar class="mobile-header">
      <button mat-icon-button (click)="goBack()">
        <mat-icon>arrow_back</mat-icon>
      </button>

      <div class="header-user-info" *ngIf="otherUser">
        <img
          [src]="otherUser.photoURL || 'assets/images/user-placeholder.png'"
          class="header-avatar"
          referrerpolicy="no-referrer"
          (error)="otherUser.photoURL = 'assets/images/user-placeholder.png'"
        />
        <span class="header-name">{{ otherUser.displayName }}</span>
      </div>
    </mat-toolbar>

    <div class="messages" #messagesContainer>
      <ng-container
        *ngFor="let msg of messages$ | async; let i = index"
      >
        <div
          class="new-messages-divider"
          *ngIf="shouldShowNewMessageDivider(i, (messages$ | async)!)"
        >
          <span>Mensajes Nuevos</span>
        </div>

        <div
          class="message"
          [ngClass]="{
            own: msg.senderId === chatService.getUserId(),
            other: msg.senderId !== chatService.getUserId()
          }"
        >
          <div class="bubble-container">
            <span class="bubble">{{ msg.text }}</span>
            <span class="msg-time">
              {{ msg.timestamp?.toDate() | date : "HH:mm" }}
            </span>
          </div>
        </div>
      </ng-container>
    </div>

    <div class="input-container">
      <input
        type="text"
        class="chat-input"
        [(ngModel)]="newMessage"
        placeholder="Escribí un mensaje..."
        (keyup.enter)="send()"
      />
      <button
        mat-icon-button
        color="primary"
        (click)="send()"
        [disabled]="!newMessage.trim()"
      >
        <mat-icon>send</mat-icon>
      </button>
    </div>
  </ng-container>

  <ng-template #emptyState>
    <div class="empty-state-container">
      <div class="empty-content">
        <mat-icon class="empty-icon">forum</mat-icon> 
        <h2>Circular Chat</h2>
        <p>Seleccioná una conversación para comenzar a chatear.</p>
      </div>
    </div>
  </ng-template>

</div>
